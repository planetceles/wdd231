    <main>
        <h1>Register Courses</h1>
        <section>
            <form method="get" action="thankyou.html" class="join-class">
                <fieldset>
                <legend>Personal Information</legend>
                    <label>First Name<span class="red">*</span> <input type="text" name="fname" required autocomplete="given-name" title="Your First Name"></label>
                    <label>Last Name<span class="red">*</span> <input type="text" name="last" required autocomplete="family-name" title="Your Last Name"></label>
                    <label>Email<span class="red">*</span> <input type="email" name="email" required placeholder="youremail@gmail.com" autocomplete="email" title="Your Email"></label>
                    <label>Phone Number<span class="red">*</span> <input type="tel" name="phone" required placeholder="123-456-7890" autocomplete="tel" title="Your Phone Number"></label>
                </fieldset>

                <fieldset>
                <legend>Courses</legend>
                <label>Course To Register<span class="red">*</span> <select name="coursesChoice" id="coursesChoice" required>
                    <option disabled selected value="">Select Your Course...</option>
                    <option value="algebra-fundamentals">algebra-fundamentals</option>
                    <option value="Geometry Essentials">Geometry Essentials</option>
                    <option value="Advanced Calculus">Advanced Calculus</option>
                    <option value="JavaScript for Beginners">JavaScript for Beginners</option>
                    <option value="HTML & CSS Mastery">HTML & CSS Mastery</option>
                    <option value="Python Programming">Python Programming</option>
                    <option value="Data Structures & Algorithms">Data Structures & Algorithms</option>
                    <option value="Statistics for Data Science">Statistics for Data Science</option>
                    <option value="React Development">React Development</option>
                    <option value="Linear Algebra">Linear Algebra</option>
                </select> </label>
                <label><input type="hidden" name="timestamp" id="timestamp"></label>
            </fieldset>
            <button type="submit">Register Course</button>
            </form>

            <div class="info">
                <h2>Courses Information</h2>
                <div id="course-info" class="course-info"></div>
                <dialog id="myDialog">
                    <div class="dialog-close">
                        <h2></h2>
                        <button>X</button>
                
                    </div>
                    <h3></h3>
                    <p></p>
                </dialog>
            </div>
        </section>
    </main>
